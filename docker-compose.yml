services:
  fhir:
    depends_on:
      - mongo
      - redis
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BULK_BASE_URL: http://localhost:3000
      DB_HOST: mongo
      DB_NAME: bulk-export-server
      REDIS_HOST: redis
      EXPORT_WORKERS: 2
    ports:
      - '3000:3000'

  mongo:
    image: mongo:7.0
    # uncomment the following to have access to the containerized mongo at 27018
    # ports:
    #   - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: dhi.io/redis:8
    command: ["redis-server", "--protected-mode no"]
    expose:
      - '6379'
volumes:
  mongo_data:
